# Fly.io konfiguratsiya fayli
app = "taskbot-cardinar"
primary_region = "fra"

[build]

[env]
  DEFAULT_TIMEZONE = "Asia/Tashkent"
  DEFAULT_LANGUAGE = "uz"
  THROTTLE_RATE = "0.5"
  DEADLINE_WARNING_HOURS = "24"
  DEADLINE_URGENT_HOURS = "1"
  DAILY_REPORT_HOUR = "9"
  CHART_DPI = "130"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

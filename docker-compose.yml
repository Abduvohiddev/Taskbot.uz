services:
  postgres:
    image: postgres:16-alpine
    container_name: taskbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskbot
      POSTGRES_PASSWORD: taskbot_password
      POSTGRES_DB: taskbot
      TZ: Asia/Tashkent
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskbot_net

  redis:
    image: redis:7-alpine
    container_name: taskbot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskbot_net

  bot:
    build: .
    container_name: taskbot_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - taskbot_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  taskbot_net:
    driver: bridge
